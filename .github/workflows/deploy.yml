name: PFIP CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Unit tests + coverage
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        env:
          ENVIRONMENT: local
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: pfip
          DB_USER: pfip_admin
          DB_PASSWORD: test_password
          JWT_SECRET: test-secret-key-for-ci-at-least-32-chars
        run: pytest tests/unit/ --cov=src --cov-fail-under=80 -q

  # ─────────────────────────────────────────────
  # Job 2: Terraform plan
  # ─────────────────────────────────────────────
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Terraform Plan
        working-directory: infra
        env:
          TF_VAR_aurora_master_password: ${{ secrets.AURORA_MASTER_PASSWORD }}
          TF_VAR_subnet_ids: ${{ secrets.TF_SUBNET_IDS }}
          TF_VAR_vpc_id: ${{ secrets.TF_VPC_ID }}
          TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
          TF_VAR_pfip_api_key: ${{ secrets.PFIP_API_KEY }}
          TF_VAR_environment: staging
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

  # ─────────────────────────────────────────────
  # Job 3: Package + deploy Lambdas
  # ─────────────────────────────────────────────
  deploy-lambdas:
    name: Deploy Lambda Functions
    runs-on: ubuntu-latest
    needs: terraform
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package all Lambdas
        run: bash scripts/package_lambdas.sh

      - name: Deploy all Lambdas
        run: |
          for agent in income_agent expense_agent savings_agent insights_agent mcp_server auth_api; do
            FUNC_NAME="pfip-staging-${agent//_/-}"
            echo "Deploying $FUNC_NAME..."
            aws lambda update-function-code \
              --function-name "$FUNC_NAME" \
              --zip-file "fileb://dist/${agent}.zip" \
              --no-cli-pager 2>&1 || echo "⚠️  $FUNC_NAME not found — run terraform apply first"
          done

  # ─────────────────────────────────────────────
  # Job 4: Build + deploy frontend to S3
  # ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-lambdas
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy to S3
        run: |
          BUCKET="${{ secrets.FRONTEND_S3_BUCKET || 'pfip-staging-frontend' }}"
          aws s3 sync frontend/dist/ "s3://$BUCKET/" --delete --no-cli-pager

      - name: Invalidate CloudFront cache
        run: |
          DIST_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "$DIST_ID" \
              --paths "/*" \
              --no-cli-pager
          fi

  # ─────────────────────────────────────────────
  # Notify on failure
  # ─────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, terraform, deploy-lambdas, deploy-frontend]
    if: failure()
    steps:
      - name: Pipeline failed
        run: |
          echo "❌ PFIP CI/CD pipeline failed"
          echo "Branch: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          exit 1
